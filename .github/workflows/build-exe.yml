name: Build .NET Framework EXE

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore NuGet packages
        run: nuget restore "Ofd2Pdf.sln"

      - name: Build solution (Release)
        run: |
          nuget restore "Ofd2Pdf.sln"
          $vsInstall = & "$env:ProgramFiles(x86)\Microsoft Visual Studio\Installer\vswhere.exe" -latest -requires Microsoft.Component.MSBuild -products * -property installationPath
          if (-not $vsInstall) { throw 'Visual Studio installation with MSBuild not found' }
          $msbuild = Join-Path $vsInstall 'MSBuild\Current\Bin\MSBuild.exe'
          if (-not (Test-Path $msbuild)) { throw "MSBuild not found in $msbuild" }
          & $msbuild "Ofd2Pdf.sln" /p:Configuration=Release /p:Platform="Any CPU" /m

      - name: Collect output files
        run: |
          dir "Ofd2Pdf\bin\Release"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Ofd2Pdf-Release
          path: |
            Ofd2Pdf\bin\Release\*.*
            Ofd2Pdf\bin\Release\**\*
